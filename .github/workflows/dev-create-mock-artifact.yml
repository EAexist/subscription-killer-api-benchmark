name: "DEV: Push Mock Artifact"
on: 
  workflow_dispatch:
    inputs:
      mock_version:
        description: 'Version tag to mock'
        required: true
        default: 'v0.0.0-test'

jobs:
  upload-mock:
    runs-on: ubuntu-latest
    steps:
      - name: Create Mock Data
        run: |
          # Create the exact structure the analytics expects
          MOCK_PATH="ai-benchmark/${{ inputs.mock_version }}/20260308_1200"
          mkdir -p "$MOCK_PATH"
          
          # Generate a CSV with all EXPECTED_COLUMNS from constants.py
          # Required: id, timestamp, version
          # Optional: trace_id, task_name
          # Cost/usage: input_tokens, instruction_tokens, output_tokens, input_tokens_per_item, output_tokens_per_item, total_tokens, cost_input, cost_output, cost_total
          # For plotting: request_index, cma_cost (cumulative moving average)
          cat > "$MOCK_PATH/results.csv" << 'EOF'
id,trace_id,timestamp,task_name,version,input_tokens,instruction_tokens,output_tokens,input_tokens_per_item,output_tokens_per_item,total_tokens,cost_input,cost_output,cost_total,request_index,cma_cost
1,trace_001,2025-03-08T12:00:00Z,email_classification,${{ inputs.mock_version }},150,50,75,3.0,1.5,4.5,0.00045,0.000375,0.000825,1,0.000825
2,trace_002,2025-03-08T12:01:00Z,email_classification,${{ inputs.mock_version }},160,55,80,3.2,1.6,4.8,0.00048,0.00040,0.000880,2,0.000852
3,trace_003,2025-03-08T12:02:00Z,email_classification,${{ inputs.mock_version }},140,45,70,2.8,1.4,4.2,0.00042,0.00035,0.000770,3,0.000825
4,trace_004,2025-03-08T12:03:00Z,email_classification,${{ inputs.mock_version }},155,52,78,3.1,1.6,4.7,0.00047,0.00039,0.000860,4,0.000834
5,trace_005,2025-03-08T12:04:00Z,email_classification,${{ inputs.mock_version }},165,58,85,3.3,1.7,5.0,0.00050,0.00043,0.000930,5,0.000853
EOF

      - name: Upload Mock Artifact
        uses: actions/upload-artifact@v4
        with:
          # This MUST match the name your main YML looks for
          name: ai-benchmark-results-${{ inputs.mock_version }}
          path: data-storage/
          retention-days: 1
name: Benchmark Run

on:
  repository_dispatch:
    types: [new_ai_benchmark_build]
  workflow_call:
    inputs:
      data_branch:
        description: 'Data branch to checkout'
        required: false
        type: string
        default: 'data'
      skip_benchmark:
        description: 'Skip benchmark job (useful for debugging)'
        required: false
        type: boolean
        default: false

env:
  DATA_BRANCH: ${{ inputs.data_branch || 'data' }}

jobs:
  run-benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    outputs:
      benchmark_dir: ${{ steps.extract-metadata.outputs.benchmark_dir }}
      app_git_tag: ${{ steps.extract-metadata.outputs.app_git_tag }}
      run_id: ${{ steps.set-run-id.outputs.run_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Data Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DATA_BRANCH }}
          path: data-storage
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata from Image
        id: extract-metadata
        run: |
          # Set IMAGE_NAME from payload
          IMAGE_NAME="${{ github.event.client_payload.image_name }}"
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          
          # Debug: Print the IMAGE_NAME
          echo "Debug: IMAGE_NAME='$IMAGE_NAME'"
          
          # Validation: Fail the build if IMAGE_NAME is empty
          if [ -z "$IMAGE_NAME" ]; then
            echo "ERROR: IMAGE_NAME is empty in payload. Check the repository dispatch payload."
            echo "Available payload keys:"
            echo "${{ toJson(github.event.client_payload) }}"
            exit 1
          fi
          
          docker pull "$IMAGE_NAME"
          
          # Extract labels
          RAW_COMMIT=$(docker inspect --format='{{index .Config.Labels "org.opencontainers.image.revision"}}' "$IMAGE_NAME")
          RAW_TAG=$(docker inspect --format='{{index .Config.Labels "org.opencontainers.image.ref.name"}}' "$IMAGE_NAME")
          
          # Validation: Fail the build if COMMIT is empty
          if [ -z "$RAW_COMMIT" ] || [ "$RAW_COMMIT" == "<no value>" ]; then
          echo "ERROR: OCI Revision (commit) missing in image metadata. Ensure Gradle build passes -PGIT_COMMIT."
          exit 1
          fi
          
          # Validation: Fail the build if TAG is empty
          if [ -z "$RAW_TAG" ] || [ "$RAW_TAG" == "<no value>" ]; then
          echo "ERROR: OCI Ref Name (tag) missing in image metadata. Ensure Gradle build passes -PGIT_TAG."
          exit 1
          fi
          
          echo "APP_GIT_COMMIT=$RAW_COMMIT" >> $GITHUB_ENV
          echo "APP_GIT_TAG=$RAW_TAG" >> $GITHUB_ENV
          
          # Set outputs for other jobs
          echo "benchmark_dir=$RAW_TAG" >> $GITHUB_OUTPUT
          echo "app_git_tag=$RAW_TAG" >> $GITHUB_OUTPUT

      - name: Write Spring environment file
        run: |
          # Combine main spring environment and google account samples
          echo '${{ secrets.SPRING_ENV_FILE_CONTENT }}' > .env.spring.benchmark.part1
          echo '${{ secrets.GOOGLE_ACCOUNT_SAMPLES }}' > .env.spring.benchmark.part2
          
          # Combine both parts into final file
          cat .env.spring.benchmark.part1 .env.spring.benchmark.part2 > .env.spring.benchmark
          
          # Clean up temporary files
          rm .env.spring.benchmark.part1 .env.spring.benchmark.part2

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Pull Mock Server
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker pull ghcr.io/${OWNER}/gmail-mock-server:latest
          docker tag ghcr.io/${OWNER}/gmail-mock-server:latest gmail-mock-server:latest

      - name: Set Run Id
        run: |
          echo "RUN_ID=${{ github.run_id }}" >> $GITHUB_ENV
          echo "run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT
        id: set-run-id

      # TODO: Update benchmark script to output results directly to data-storage/results/runs/ instead of results/
      # This will eliminate the need for copying and use the data branch approach consistently
      - name: Run Benchmark
        if: ${{ !inputs.skip_benchmark }}
        env:
          # Only benchmark-specific variables
          APP_GIT_COMMIT: ${{ env.APP_GIT_COMMIT }}
          APP_GIT_TAG: ${{ env.APP_GIT_TAG }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          RESULTS_DIR: data-storage  # Use data-storage directly
          RUN_ID: "${{ env.RUN_ID }}"

          # AI Cost Benchmark configuration
          GEMINI_3_FLASH_PREVIEW_INPUT_TOKEN_PRICE_PER_MILLION: ${{ vars.GEMINI_3_FLASH_PREVIEW_INPUT_TOKEN_PRICE_PER_MILLION }}
          GEMINI_3_FLASH_PREVIEW_OUTPUT_TOKEN_PRICE_PER_MILLION: ${{ vars.GEMINI_3_FLASH_PREVIEW_OUTPUT_TOKEN_PRICE_PER_MILLION }}
          AI_BENCHMARK_ENABLE_VERBOSE_DOCKER_LOGS: ${{ vars.AI_BENCHMARK_ENABLE_VERBOSE_DOCKER_LOGS }}
          AI_BENCHMARK_ENDPOINT: ${{ vars.AI_BENCHMARK_ENDPOINT }}
          AI_BENCHMARK_K6_ITERATIONS: ${{ vars.AI_BENCHMARK_K6_ITERATIONS }}
          AI_BENCHMARK_K6_WARMUP_ITERATIONS: ${{ vars.AI_BENCHMARK_K6_WARMUP_ITERATIONS }}
          N_EMAILS_PER_REQUEST: ${{ vars.N_EMAILS_PER_REQUEST }}
          N_COMPANIES_PER_CHUNK: ${{ vars.N_COMPANIES_PER_CHUNK }}
          AI_BENCHMARK_REQUEST_TIMEOUT: ${{ vars.AI_BENCHMARK_REQUEST_TIMEOUT }}
        run: |
          chmod +x run-ai-benchmark.sh
          ./run-ai-benchmark.sh

      - name: Setup Python for Langfuse Loader
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: scripts/langfuse_loader/requirements.txt

      - name: Install Langfuse Loader Dependencies
        run: |
          cd scripts/langfuse_loader
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Load Result from Langfuse Cloud
        env:
          LANGFUSE_HOST: ${{ vars.LANGFUSE_HOST }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          DATA_STORAGE_ROOT: ${{ github.workspace }}/data-storage
          PYTHONIOENCODING: utf-8          
          # Benchmark context variables
          APP_VERSION: ${{ env.APP_GIT_TAG }}
          RUN_ID: ${{ env.RUN_ID }}
          AI_BENCHMARK_K6_ITERATIONS: ${{ vars.AI_BENCHMARK_K6_ITERATIONS }}
        run: |
          cd scripts/langfuse_loader
          python main.py \
            --app-version "$APP_VERSION" \
            --run-id "$RUN_ID"

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-benchmark-results-${{ env.APP_GIT_TAG }}
          path: data-storage/
          retention-days: 30

      - name: Commit and Push Benchmark Results
        working-directory: data-storage
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Debug: See what files were created/modified
          echo "Files in data-storage:"
          find . -type f -name "*.json" -o -name "*.txt" -o -name "*.log" | head -20
          
          git add .
          
          # Only commit and push if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "benchmark: add results for ${{ env.APP_GIT_TAG }} (run ${{ env.RUN_ID }})"
            git push origin HEAD:${{ env.DATA_BRANCH }}
            echo "✅ Benchmark results pushed to data branch"
          else
            echo "⚠️ No benchmark results detected. Skipping push."
          fi

  process-benchmark-data:
    needs: run-benchmark
    uses: ./.github/workflows/present-benchmark-result.yml
    with:
      app_version: ${{ needs.run-benchmark.outputs.app_git_tag }}
      data_branch: ${{ inputs.data_branch || 'data' }}
      run_id: ${{ needs.run-benchmark.outputs.run_id }}
    secrets: inherit

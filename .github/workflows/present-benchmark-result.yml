name: Benchmark Data Processing

on:
  workflow_call:
    inputs:
      app_version:
        required: true
        type: string
    # ... outputs stay same

env:
  DATA_BRANCH: data-test

jobs:
  process-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source (Main)
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Checkout Data Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DATA_BRANCH }}
          path: data-storage
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: main-repo/requirements.txt

      - name: Install Dependencies
        run: |
          cd main-repo
          pip install -r requirements.txt

      - name: Run Langfuse Analytics
        env:
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_HOST: ${{ vars.LANGFUSE_HOST }}
          # Pass the paths as environment variables so Python knows where to find/save
          DATA_STORAGE_ROOT: ${{ github.workspace }}/data-storage
        run: |
          if [ -n "$LANGFUSE_SECRET_KEY" ]; then
            cd main-repo/scripts/langfuse_analytics
            python main.py --app-version "${{ inputs.app_version }}"
          fi

      - name: Commit and Push
        # TODO: change to data when ready
        working-directory: data-storage
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Debug: See if any files were actually created/modified
          ls -R 
          
          git add .
          
          # Only commit and push if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "data: update results for ${{ inputs.app_version }}"
            git push origin HEAD:${{ env.DATA_BRANCH }}
          else
            echo "No changes detected in data-storage. Skipping push."
          fi
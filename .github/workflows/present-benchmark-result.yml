name: Benchmark Process

on:
  workflow_call:
    inputs:
      app_version:
        required: true
        type: string
      data_branch:
        description: 'Data branch to checkout'
        required: false
        type: string
        default: 'data'
    # ... outputs stay same

jobs:
  process-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source (Main)
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Checkout Data Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.data_branch }}
          path: data-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: main-repo/scripts/langfuse_analytics/requirements.txt

      - name: Install Dependencies
        run: |
          cd main-repo/scripts/langfuse_analytics
          python -m pip install --upgrade pip
          # pip install -r requirements.txt
          # Clear previous installs and install fresh
          pip install --force-reinstall -r requirements.txt

      - name: Debug Environment
        run: |
          pip show langfuse
          python -c "from langfuse import Langfuse; print(dir(Langfuse))"

      - name: Run Langfuse Analytics
        env:
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_HOST: ${{ vars.LANGFUSE_HOST }}
          DATA_STORAGE_ROOT: ${{ github.workspace }}/data-repo/data-storage
          AI_BENCHMARK_K6_ITERATIONS: ${{ vars.AI_BENCHMARK_K6_ITERATIONS }}
        run: |
          if [ -n "$LANGFUSE_SECRET_KEY" ]; then
            echo " Langfuse credentials found. Running analytics pipeline..."
            cd main-repo/scripts/langfuse_analytics
            python main.py --app-version "${{ inputs.app_version }}"
          else
            echo " LANGFUSE_SECRET_KEY not found. Skipping analytics pipeline."
            echo "Please set LANGFUSE_SECRET_KEY and LANGFUSE_PUBLIC_KEY secrets in your repository settings."
          fi

      - name: Commit and Push
        # TODO: change to data when ready
        working-directory: data-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Debug: See if any files were actually created/modified
          ls -R 
          
          git add .
          
          # Only commit and push if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "data: update results for ${{ inputs.app_version }}"
            git push origin HEAD:${{ env.DATA_BRANCH }}
          else
            echo "No changes detected in data-storage. Skipping push."
          fi
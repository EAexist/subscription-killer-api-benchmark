name: Benchmark Process

on:
  workflow_call:
    inputs:
      run_id:
        required: true
        type: string
      app_version:
        required: true
        type: string
      data_branch:
        description: 'Data branch to checkout'
        required: false
        type: string
        default: 'data'

jobs:
  process-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Data Branch (Primary)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.data_branch }}
          path: data-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Source Code (Main)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-repo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            main-repo/scripts/langfuse_loader/requirements.txt
            main-repo/scripts/analytics/requirements.txt
            main-repo/pyproject.toml

      - name: Install Langfuse Loader Dependencies
        run: |
          cd main-repo/scripts/langfuse_loader
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Load Result from Langfuse Cloud
        env:
          LANGFUSE_HOST: ${{ vars.LANGFUSE_HOST }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          DATA_STORAGE_ROOT: ${{ github.workspace }}
          PYTHONIOENCODING: utf-8          
          # Benchmark context variables
          APP_VERSION: ${{ inputs.app_version }}
          RUN_ID: ${{ inputs.run_id }}
          AI_BENCHMARK_K6_ITERATIONS: ${{ vars.AI_BENCHMARK_K6_ITERATIONS }}
        run: |
          cd main-repo/scripts/langfuse_loader
          python main.py \
            --app-version "$APP_VERSION" \
            --run-id "$RUN_ID" \
            --expected-request-count "$AI_BENCHMARK_K6_ITERATIONS"

      - name: Install Analytics Dependencies
        run: |
          cd main-repo/scripts/analytics
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Analytics
        env:
          DATA_STORAGE_ROOT: ${{ github.workspace }}
          AI_BENCHMARK_K6_ITERATIONS: ${{ vars.AI_BENCHMARK_K6_ITERATIONS }}
        run: |
          cd main-repo/scripts/analytics
          python main.py --app-version "${{ inputs.app_version }}" --run-id "${{ inputs.run_id }}" --analytics-run-id "${{ github.run_id }}"

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-presentation-${{ inputs.run_id }}
          path: logs/
          retention-days: 7

      - name: Commit and Push Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Debug: See what files exist in results directory
          echo "=== Checking data-storage/results/ directory ==="
          ls -R data-storage/results/ || echo "No results directory found"
          
          # Only add files in data-storage/results/ path
          git add data-storage/results/
          
          # Show what will be committed
          echo "=== Files to be committed ==="
          git diff --cached --name-only
          
          # Only commit and push if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "data: update results for ${{ inputs.app_version }}"
            git push origin HEAD:${{ inputs.data_branch }}
          else
            echo "No changes detected in data-storage/results/. Skipping push."
          fi